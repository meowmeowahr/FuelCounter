<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fuel Detector | Control</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030309; --surface: #0d0d14; --panel: #131319;
            --border: #222230; --accent: #00e5ff; --accent2: #ff6b00;
            --text: #c8ccd8; --muted: #555570; --good: #00e599;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; height: 100vh; background: var(--bg); color: var(--text);
            font-family: 'JetBrains Mono', monospace; display: flex; flex-direction: column;
        }

        /* Layout */
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 16px; margin: 0; color: var(--accent); letter-spacing: 1px; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .nav { width: 180px; background: var(--panel); border-right: 1px solid var(--border); }
        .nav-item { 
            padding: 15px 20px; cursor: pointer; font-size: 12px; border-left: 3px solid transparent; 
            transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover { background: #1a1a24; }
        .nav-item.active { border-color: var(--accent); color: var(--accent); background: #0d1a1f; }

        .content { flex: 1; display: flex; overflow: hidden; }
        .viewport { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .img-wrap { 
            flex: 1; background: #000; border: 1px solid var(--border); 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Config Sidebar */
        .config-sidebar { 
            width: 300px; background: var(--surface); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column;
        }
        .config-header { 
            padding: 15px; border-bottom: 1px solid var(--border); 
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; background: var(--surface);
        }
        .config-scroll { flex: 1; overflow-y: auto; padding-bottom: 30px; }
        
        /* Dynamic Components */
        .section-title { 
            padding: 15px 15px 5px; font-size: 10px; color: var(--accent2); 
            text-transform: uppercase; letter-spacing: 1px;
        }
        .control-group { padding: 10px 15px; border-bottom: 1px solid #1a1a24; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
        .val { color: var(--accent); }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select { 
            width: 100%; background: var(--panel); color: var(--text); border: 1px solid var(--border);
            padding: 6px; border-radius: 4px; font-family: inherit; font-size: 11px;
        }

        /* Toggle Switch */
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; cursor: pointer; inset: 0; background: var(--border); 
            transition: .3s; border-radius: 20px; 
        }
        .slider:before { 
            content: ""; position: absolute; height: 12px; width: 12px; left: 3px; bottom: 3px; 
            background: var(--muted); transition: .3s; border-radius: 50%;
        }
        input:checked + .slider { background: rgba(0, 229, 255, 0.2); }
        input:checked + .slider:before { transform: translateX(16px); background: var(--accent); }

        .btn { 
            background: var(--accent); border: none; padding: 6px 12px; font-weight: 600; 
            cursor: pointer; border-radius: 3px; font-size: 10px; transition: 0.3s;
        }
        .btn.saved { background: var(--good); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <h1>FUEL DETECTOR</h1>
        <div style="font-size: 11px;">IP: {{ip}}</div>
    </div>

    <div class="main">
        <div class="nav">
            <div class="nav-item active" onclick="switchTab('vision')">VISION</div>
            <div class="nav-item" onclick="switchTab('networking')">NETWORKING</div>
            <div class="nav-item" onclick="switchTab('system')">SYSTEM</div>
        </div>

        <div class="content" id="tab-vision">
            <div class="viewport">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 11px;">STREAM TYPE:</label>
                    <select id="stream-type" style="width: auto;" onchange="updateStream()">
                        <option value="raw">Raw Feed</option>
                        <option value="visual">Visual Detection</option>
                        <option value="mask">Binary Mask</option>
                    </select>
                </div>
                <div class="img-wrap">
                    <img id="stream-img" src="http://{{ip}}:{{video_port}}/raw" alt="stream">
                </div>
            </div>

            <div class="config-sidebar">
                <div class="config-header">
                    <span style="font-size: 11px; font-weight: 600;">PARAMETERS</span>
                    <button class="btn" id="save-btn" onclick="saveConfig()">APPLY</button>
                </div>
                <div class="config-scroll" id="config-container">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // 1. This is the "Source of Truth" for your menu structure
        const configSchema = [
            {
                section: "Detection",
                fields: [
                    { id: "confidence", label: "Confidence", type: "range", min: 0, max: 1, step: 0.01, value: 0.55 },
                    { id: "contour_area", label: "Min Area (px²)", type: "range", min: 50, max: 5000, step: 50, value: 500 },
                    { id: "mode", label: "Mode", type: "select", options: ["hue_range", "edge_gradient", "combined"], value: "hue_range" }
                ]
            },
        ];

        // 2. Build the UI from JSON
        function renderConfig(schema) {
            const container = document.getElementById('config-container');
            container.innerHTML = '';

            schema.forEach(sec => {
                const secEl = document.createElement('div');
                secEl.innerHTML = `<div class="section-title">${sec.section}</div>`;
                
                sec.fields.forEach(field => {
                    const row = document.createElement('div');
                    row.className = 'control-group';

                    if (field.type === 'range') {
                        row.innerHTML = `
                            <div class="label-row"><span>${field.label}</span><span class="val" id="v-${field.id}">${field.value}</span></div>
                            <input type="range" id="cfg-${field.id}" min="${field.min}" max="${field.max}" step="${field.step}" value="${field.value}" 
                                oninput="document.getElementById('v-${field.id}').innerText = this.value">`;
                    } else if (field.type === 'select') {
                        row.innerHTML = `
                            <div class="label-row"><span>${field.label}</span></div>
                            <select id="cfg-${field.id}">${field.options.map(o => `<option value="${o}" ${o === field.value ? 'selected' : ''}>${o}</option>`).join('')}</select>`;
                    } else if (field.type === 'toggle') {
                        row.innerHTML = `
                            <div class="label-row">
                                <span>${field.label}</span>
                                <label class="switch">
                                    <input type="checkbox" id="cfg-${field.id}" ${field.value ? 'checked' : ''}>
                                    <span class="slider"></span>
                                </label>
                            </div>`;
                    }
                    secEl.appendChild(row);
                });
                container.appendChild(secEl);
            });
        }

        // 3. Collect data from UI
        function getValues() {
            const data = {};
            configSchema.forEach(sec => {
                sec.fields.forEach(f => {
                    const el = document.getElementById(`cfg-${f.id}`);
                    data[f.id] = f.type === 'toggle' ? el.checked : (f.type === 'range' ? parseFloat(el.value) : el.value);
                });
            });
            return data;
        }

        // 4. API Operations
        async function saveConfig() {
            const btn = document.getElementById('save-btn');
            const data = getValues();
            console.log("Sending to API:", data);

            try {
                const res = await fetch('/api/vision/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (res.ok) {
                    btn.innerText = 'SAVED'; btn.classList.add('saved');
                    setTimeout(() => { btn.innerText = 'APPLY'; btn.classList.remove('saved'); }, 2000);
                }
            } catch (e) { alert("Mock Save Successful (No Backend)"); }
        }

        function updateStream() {
            const type = document.getElementById('stream-type').value;
            document.getElementById('stream-img').src = `http://{{ip}}:{{video_port}}/${type}?t=${Date.now()}`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.toggle('active', el.innerText.toLowerCase() === tab));
            // In a real app, hide/show different content boxes here
        }

        // Initialize
        renderConfig(configSchema);
    </script>
</body>
</html>
