<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fuel Counter</title>

    <script>
        function updateStream() {
            const type = document.getElementById('stream-type').value;
            console.log("Switching stream to:", type);
            document.getElementById('stream-img').src = `http://{{ip}}:{{video_port}}/${type}?t=${Date.now()}`;
        }
        
        async function refreshNumber() {
            try {
                const response = await fetch("/api/count", {method: "GET"});
                var number = await response.text();
            } catch (error) {
                console.error(error);
                var number = "?";
            }
            document.querySelectorAll("#number").forEach(element => {
                element.innerHTML = number;
            });
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-item').forEach(el => 
                el.classList.toggle('active', el.innerText.toLowerCase() === tab)
            );
            document.querySelectorAll(".content").forEach(el =>
                el.classList.toggle('active', el.id === "tab-" + tab)
            )
        }

        // Initialize
        window.onload = () => {
            updateStream();
            refreshNumber();
        };

        setInterval(refreshNumber, 250);
    </script>

    <style>
        :root {
            --bg: #030309; --surface: #0d0d14; --panel: #131319;
            --border: #222230; --accent: #97f5ff;
            --text: #c8ccd8; --muted: #555570; --good: #00e599;
        }

        * { box-sizing: border-box; }
        body { 
            margin: 0; height: 100vh; background: var(--bg); color: var(--text);
            font-family: sans-serif; display: flex; flex-direction: column;
        }

        /* Layout */
        .header { 
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 20px; background: var(--panel); border-bottom: 1px solid var(--border);
        }
        .header h1 { font-size: 16px; margin: 0; color: var(--accent); letter-spacing: 1px; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        .nav { width: 180px; background: var(--panel); border-right: 1px solid var(--border); }
        .nav-item { 
            padding: 15px 20px; cursor: pointer; font-size: 12px; border-left: 3px solid transparent; 
            transition: 0.2s; display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover { background: #1a1a24; }
        .nav-item.active { border-color: var(--accent); color: var(--accent); background: #0d1a1f; }

        .content { flex: 1; overflow: hidden; display: none; }
        .content.active {
            display: flex !important;
        }
        .viewport { flex: 1; padding: 20px; display: flex; flex-direction: column; }
        .img-wrap { 
            flex: 1; background: #000; border: 1px solid var(--border); 
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .img-wrap img { max-width: 100%; max-height: 100%; object-fit: contain; }

        /* Config Sidebar */
        .sidebar { 
            width: 300px; background: var(--surface); border-left: 1px solid var(--border); 
            display: flex; flex-direction: column;
                justify-content: center;
    align-items: center;
    container-type: inline-size;
        }
        .control-group { padding: 10px 15px; border-bottom: 1px solid #1a1a24; }
        .label-row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 8px; }
        .val { color: var(--accent); }

        input[type=range] { width: 100%; accent-color: var(--accent); cursor: pointer; }
        select { 
            width: 100%; background: var(--panel); color: var(--text); border: 1px solid var(--border);
            padding: 6px; border-radius: 4px; font-family: inherit; font-size: 11px;
        }

        .btn { 
            background: var(--accent); border: none; padding: 6px 12px; font-weight: 600; 
            cursor: pointer; border-radius: 3px; font-size: 10px; transition: 0.3s;
            margin: 6px;
        }
        .btn.saved { background: var(--good); color: #000; }

        .sidebar-number {
            font-size: 42cqi;
            font-family: sans-serif;
        }

        .large-number-container {
            justify-content: center;
            align-items: center;
        }

        .large-number {
            font-size: 36vw;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Fuel Counter</h1>
        <div style="font-size: 11px;">IP: {{ip}}</div>
    </div>

    <div class="main">
        <div class="nav">
            <div class="nav-item active" onclick="switchTab('vision')">Vision</div>
            <div class="nav-item" onclick="switchTab('number')">Number</div>
            <div class="nav-item" onclick="switchTab('config')">Config</div>
            <div class="nav-item" onclick="switchTab('stats')">Stats</div>
        </div>

        <div class="content active" id="tab-vision">
            <div class="viewport">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <label style="font-size: 11px;">Stream:</label>
                    <select id="stream-type" style="width: auto;" onchange="updateStream()">
                        <option value="raw">Raw Feed</option>
                        <option value="visual">Visual Detection</option>
                        <option value="mask">Binary Mask</option>
                    </select>
                </div>
                <div class="img-wrap">
                    <img id="stream-img" src="http://{{ip}}:{{video_port}}/raw" alt="stream">
                </div>
            </div>

            <div class="sidebar">
                <p class="sidebar-number" id="number">0</p>
            </div>
        </div>

        <div class="content" id="tab-number">
            <div class="viewport large-number-container">
                <h1 class="large-number" id="number">0</h1>
            </div>
        </div>
        <div class="content" id="tab-config">
            <div class="viewport" id="editor-container" style="padding: 0;">
                <div id="tab-bar" style="display:flex; background:#2d2d2d; border-bottom:1px solid #444;">
                    <div class="tab active" data-name="camera">camera.json</div>
                    <div class="tab" data-name="pipeline">pipeline.json</div>
                    <div class="tab" data-name="stream">stream.json</div>
                    <div style="flex: 999;"></div>
                    <button id="save-btn" class="btn">Save</button>
                </div>

                <div id="editor" style="flex:1; position:relative;"></div>
            </div>

            <script src="/static/monaco/vs/loader.js"></script>

            <style>
                .tab {
                    padding: 8px 14px;
                    cursor: pointer;
                    color: #ccc;
                    user-select: none;
                    position: relative;
                }

                .tab:hover {
                    background: #3a3a3a;
                }

                .tab.active {
                    background: #1e1e1e;
                    color: white;
                }

                .tab.dirty::after {
                    content: "●";
                    color: orange;
                    position: absolute;
                    top: 4px;
                    right: 4px;
                    font-size: 10px;
                }

            </style>

            <script>
                let editor;
                const models = {};
                const dirtyFlags = {}; // track unsaved changes per model
                let currentTab = "camera";

                require.config({
                    paths: { vs: "/static/monaco/vs" }
                });

                require(["vs/editor/editor.main"], function () {

                    monaco.languages.json.jsonDefaults.setDiagnosticsOptions({
                        validate: true,
                        allowComments: true
                    });

                    // Create models for each config
                    ["camera","pipeline","stream"].forEach(name => {
                        models[name] = monaco.editor.createModel("{}", "json");
                        dirtyFlags[name] = false;

                        // Track changes to set dirty flag
                        models[name].onDidChangeContent(() => {
                            if (!dirtyFlags[name]) {
                                dirtyFlags[name] = true;
                                updateTabIndicator(name);
                            }
                        });
                    });

                    // Create the editor
                    editor = monaco.editor.create(
                        document.getElementById("editor"),
                        {
                            model: models.camera,
                            theme: "vs-dark",
                            automaticLayout: true,
                            minimap: { enabled: false }
                        }
                    );

                    setupTabs();
                    setupSaveButton();
                    loadAllConfigs();
                });

                function setupTabs() {
                    document.querySelectorAll(".tab").forEach(tab => {
                        tab.addEventListener("click", (e) => {
                            const name = tab.dataset.name;
                            switchEditorTab(name, e.target);
                        });
                    });
                }

                function switchEditorTab(name, tabElement) {
                    currentTab = name;
                    editor.setModel(models[name]);

                    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
                    tabElement.classList.add("active");
                }

                function updateTabIndicator(name) {
                    const tab = document.querySelector(`.tab[data-name="${name}"]`);
                    if (dirtyFlags[name]) tab.classList.add("dirty");
                    else tab.classList.remove("dirty");
                }

                function setupSaveButton() {
                    document.getElementById("save-btn").addEventListener("click", async () => {
                        const name = currentTab;

                        let parsed;
                        try {
                            parsed = JSON.parse(models[name].getValue());
                        } catch (e) {
                            return;
                        }

                        try {
                            await fetch(`/api/config/${name}`, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({ content: parsed })
                            });

                            dirtyFlags[name] = false;
                            updateTabIndicator(name);

                        } catch (e) {
                            console.error(e);
                        }
                    });
                }

                async function loadAllConfigs() {
                    for (const name of Object.keys(models)) {
                        try {
                            const res = await fetch(`/api/config/${name}`);
                            const data = await res.json();

                            const jsonString = JSON.stringify(data.content ?? data, null, 4);
                            models[name].setValue(jsonString);
                            dirtyFlags[name] = false;
                            updateTabIndicator(name);

                        } catch (e) {
                            console.error("Load error:", e);
                            models[name].setValue('{\n    "error": "Failed to load"\n}');
                            dirtyFlags[name] = false;
                            updateTabIndicator(name);
                        }
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>
